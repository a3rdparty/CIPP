name: Deploy CIPP to Azure Static Web Apps

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: ["main"]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Install dependencies (CIPP uses yarn.lock)
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Build (with output: "export" + distDir "./out", this should produce ./out)
      - name: Build
        run: yarn build

      # Ensure SWA config is included in the deployed output root
      # SWA requires staticwebapp.config.json to be present in output_location when a build step is used
      - name: Copy SWA config into output folder
        run: cp staticwebapp.config.json out/staticwebapp.config.json

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # SWA build config
          app_location: "/"
          api_location: ""
          output_location: "out"
